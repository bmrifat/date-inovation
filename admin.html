<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitations Dashboard 💕</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Dancing+Script:wght@600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(-45deg, #1a0a2e, #2d1b4e, #4a1942, #16213e);
            background-size: 400% 400%;
            animation: gradientShift 12s ease infinite;
            font-family: 'Poppins', sans-serif;
            color: #fff;
            padding: 30px 20px;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .dashboard-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .dashboard-header h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            color: #ff8fab;
            text-shadow: 0 0 20px rgba(255, 143, 171, 0.4);
            margin-bottom: 8px;
        }

        .dashboard-header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.95rem;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 35px;
            flex-wrap: wrap;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 18px 30px;
            text-align: center;
            min-width: 140px;
        }

        .stat-box .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #ff6b9d;
        }

        .stat-box .stat-label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .invitations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .invitation-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 25px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .invitation-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(255, 107, 157, 0.2);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-number {
            background: linear-gradient(135deg, #ff6b9d, #ff8fab);
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .card-time {
            color: rgba(255, 255, 255, 0.45);
            font-size: 0.78rem;
            margin-left: auto;
        }

        .card-details {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .detail-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .detail-emoji {
            font-size: 1.3rem;
            width: 32px;
            text-align: center;
            flex-shrink: 0;
        }

        .detail-info {
            display: flex;
            flex-direction: column;
        }

        .detail-label {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .detail-value {
            font-size: 1rem;
            font-weight: 500;
            color: #fff;
        }

        /* Loading & Empty */
        .loading-screen {
            text-align: center;
            padding: 80px 20px;
        }

        .loading-screen .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.15);
            border-top: 4px solid #ff6b9d;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-screen p {
            color: rgba(255, 255, 255, 0.5);
        }

        /* Clear All Button */
        .clear-all-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            background: linear-gradient(135deg, #ff4d6d, #c9184a);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(201, 24, 74, 0.3);
        }

        .clear-all-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(201, 24, 74, 0.5);
            background: linear-gradient(135deg, #ff6b81, #e0003b);
        }

        .clear-all-btn:active {
            transform: scale(0.96);
        }

        .clear-all-btn.loading {
            opacity: 0.6;
            cursor: not-allowed;
            pointer-events: none;
        }

        .clear-wrapper {
            text-align: center;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state .empty-emoji {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .empty-state p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 1rem;
        }

        /* Responsive */
        @media (max-width: 500px) {
            .dashboard-header h1 {
                font-size: 1.8rem;
            }

            .invitations-grid {
                grid-template-columns: 1fr;
            }

            .stat-box {
                min-width: 100px;
                padding: 14px 18px;
            }
        }
    </style>
</head>

<body>

    <div class="dashboard-header">
        <h1>💕 Date Invitations</h1>
        <p>All invitations sent through Rifat's Date App</p>
    </div>

    <div class="stats-bar" id="statsBar" style="display:none;">
        <div class="stat-box">
            <div class="stat-number" id="totalCount">0</div>
            <div class="stat-label">Total Invitations</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="todayCount">0</div>
            <div class="stat-label">Today</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="favFood">-</div>
            <div class="stat-label">Fav Food</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="favActivity">-</div>
            <div class="stat-label">Fav Activity</div>
        </div>
    </div>

    <div class="clear-wrapper" id="clearWrapper" style="display:none;">
        <button class="clear-all-btn" id="clearAllBtn">🗑️ Clear All Invitations</button>
    </div>

    <div class="invitations-grid" id="invitationsGrid">
        <div class="loading-screen" id="loading">
            <div class="spinner"></div>
            <p>Loading invitations...</p>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/11.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore-compat.js"></script>

    <script>
        // Firebase init — same config as main app
        const firebaseConfig = {
            apiKey: "AIzaSyCKmH63bIXMjasE5FDZ5baqgw8KVT07hhc",
            authDomain: "date-invitation-1cd66.firebaseapp.com",
            projectId: "date-invitation-1cd66",
            storageBucket: "date-invitation-1cd66.firebasestorage.app",
            messagingSenderId: "321188338430",
            appId: "1:321188338430:web:362175d10ca55b9e14e3af",
            measurementId: "G-MWVCS8TW3J"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Load all invitations from Firestore
        db.collection('invitations').orderBy('createdAt', 'desc').get()
            .then(snapshot => {
                const grid = document.getElementById('invitationsGrid');
                const loading = document.getElementById('loading');

                if (snapshot.empty) {
                    loading.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-emoji">💌</div>
                            <p>No invitations yet.<br>Share the app and wait for responses!</p>
                        </div>`;
                    return;
                }

                // Build stats
                const docs = [];
                snapshot.forEach(doc => docs.push({ id: doc.id, ...doc.data() }));

                // Show stats bar
                document.getElementById('statsBar').style.display = 'flex';
                document.getElementById('clearWrapper').style.display = 'block';
                document.getElementById('totalCount').textContent = docs.length;

                // Count unique names
                const uniqueNames = [...new Set(docs.map(d => d.name).filter(Boolean))];
                const nameStatLabel = document.querySelector('.stat-box:nth-child(5) .stat-label');
                const nameStatNumber = document.querySelector('.stat-box:nth-child(5) .stat-number');

                // Count today's invitations (local timezone)
                const now = new Date();
                const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
                const todayDocs = docs.filter(d => d.date === todayStr);
                document.getElementById('todayCount').textContent = todayDocs.length;

                // Most popular food & activity
                const foodCounts = {};
                const actCounts = {};
                docs.forEach(d => {
                    if (d.food) foodCounts[d.food] = (foodCounts[d.food] || 0) + 1;
                    if (d.activity) actCounts[d.activity] = (actCounts[d.activity] || 0) + 1;
                });
                const topFood = Object.entries(foodCounts).sort((a, b) => b[1] - a[1])[0];
                const topAct = Object.entries(actCounts).sort((a, b) => b[1] - a[1])[0];
                document.getElementById('favFood').textContent = topFood ? topFood[0] : '-';
                document.getElementById('favActivity').textContent = topAct ? topAct[0] : '-';

                // Remove loading spinner
                loading.remove();

                // Render cards
                docs.forEach((data, i) => {
                    const card = document.createElement('div');
                    card.className = 'invitation-card';

                    let timeAgo = '';
                    if (data.createdAt) {
                        const created = data.createdAt.toDate ? data.createdAt.toDate() : new Date(data.createdAt);
                        const diff = Math.floor((Date.now() - created.getTime()) / 1000);
                        if (diff < 60) timeAgo = 'Just now';
                        else if (diff < 3600) timeAgo = Math.floor(diff / 60) + 'm ago';
                        else if (diff < 86400) timeAgo = Math.floor(diff / 3600) + 'h ago';
                        else timeAgo = Math.floor(diff / 86400) + 'd ago';
                    }

                    card.innerHTML = `
                        <div class="card-header">
                            <div class="card-number">${docs.length - i}</div>
                            <span style="font-weight:600;">${data.name ? data.name : 'Someone'}'s Invitation #${docs.length - i}</span>
                            <span class="card-time">${timeAgo}</span>
                        </div>
                        <div class="card-details">
                            <div class="detail-row">
                                <span class="detail-emoji">👤</span>
                                <div class="detail-info">
                                    <span class="detail-label">Name</span>
                                    <span class="detail-value">${data.name || 'Anonymous'}</span>
                                </div>
                            </div>
                            <div class="detail-row">
                                <span class="detail-emoji">📅</span>
                                <div class="detail-info">
                                    <span class="detail-label">Date</span>
                                    <span class="detail-value">${data.dateFormatted || data.date || '-'}</span>
                                </div>
                            </div>
                            <div class="detail-row">
                                <span class="detail-emoji">🍽️</span>
                                <div class="detail-info">
                                    <span class="detail-label">Food</span>
                                    <span class="detail-value">${data.food || '-'}</span>
                                </div>
                            </div>
                            <div class="detail-row">
                                <span class="detail-emoji">✨</span>
                                <div class="detail-info">
                                    <span class="detail-label">Activity</span>
                                    <span class="detail-value">${data.activity || '-'}</span>
                                </div>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            })
            .catch(err => {
                console.error('Error loading invitations:', err);
                document.getElementById('invitationsGrid').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-emoji">⚠️</div>
                        <p>Could not load invitations.<br><small>${err.message}</small></p>
                    </div>`;
            });
        // Clear All Invitations
        document.getElementById('clearAllBtn').addEventListener('click', function () {
            if (!confirm('⚠️ Are you sure you want to delete ALL invitations?\n\nThis cannot be undone!')) return;

            const btn = this;
            btn.classList.add('loading');
            btn.textContent = '🗑️ Deleting...';

            db.collection('invitations').get()
                .then(snapshot => {
                    const batch = db.batch();
                    snapshot.forEach(doc => batch.delete(doc.ref));
                    return batch.commit();
                })
                .then(() => {
                    btn.textContent = '✅ All Deleted!';
                    setTimeout(() => { location.reload(); }, 1000);
                })
                .catch(err => {
                    console.error('Error clearing:', err);
                    btn.classList.remove('loading');
                    btn.textContent = '❌ Error — Try Again';
                    setTimeout(() => { btn.textContent = '🗑️ Clear All Invitations'; }, 2000);
                });
        });
    </script>
</body>

</html>
